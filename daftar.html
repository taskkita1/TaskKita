  <script>
function kirimData(){
  const nama = document.querySelector('input[placeholder="Nama"]').value;
  const alamat = document.querySelector('input[placeholder="Alamat"]').value;
  const jasa = document.getElementById("jasa").value;
  const deskripsi = document.querySelector('textarea').value;

  if(!nama || !alamat || !jasa){
    alert("Isi semua dulu bro!");
    return;
  }

  db.collection("orders").add({
    nama,
    alamat,
    jasa,
    deskripsi,
    waktu: new Date()
  })
  .then(() => {
    alert("Berhasil dikirim 🔥");
  })
  .catch(err => {
    alert("Error: " + err);
  });
}
  </script>
<body>

<header class="navbar">
  <img src="logo.png" alt="TaskKita Logo" class="logo">
</header>

<section class="hero">
  <h1>Pasang pekerjaan dengan mudah</h1>
  <p>Isi data di bawah ini</p>
</section>

  
<!-- FORM DI SINI -->
<div class="card">
  <div class="search-box">
  <input type="text" placeholder="Nama">
  <input type="text" placeholder="Alamat">
  <input type="text" placeholder="deskripsi pekerjaan">

  <select>
    <option>Pilih Jasa</option>
    <option>Tukang Listrik</option>
    <option>AC</option>
    <option>Cleaning</option>
    <option>Ledeng</option>
  </select>
    <button onclick="kirimData()" class="btn full">Kirim</button>
  </div>
</div>

</body>
</html>
