<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>TaskKita</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <img src="logo.png" alt="TaskKita Logo" class="logo">
  <button class="btn-biru" onclick="window.open('daftar.html', '_blank')">
  Pasang Pekerjaan
  </button>
</header>
  
<section class="hero">
  <h1>Cari tukang andal,<br><span>selesai dalam sekejap.</span></h1>
  <p>Dari listrik bocor sampai cat ulang rumah</p>
</section>

<section class="kategori">
  <div class="card">⚡<br>Listrik</div>
  <div class="card">🔨<br>Tukang Kayu</div>
  <div class="card">🚚<br>Pindahan</div>
  <div class="card">💧<br>Ledeng</div>
</section>

<!-- FORM DI SINI -->
<div class="card" id="formOrder">
  <div class="search-box">
    <input type="text" placeholder="Cari tukang atau layanan...">
    <button class="btn full">Cari Tukang</button>
  </div>
</div>
  
<script>
function scrollKeForm(){
  const el = document.getElementById("formOrder");
  if (el) {
    el.scrollIntoView({ behavior: "smooth" });
  }
}
</script>
  
</body>
</html>
