<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>TaskKita</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <img src="logo.png" alt="TaskKita Logo" class="logo">
  <button onclick="pindahHalaman('daftar.html')" class="btn-biru">
  Pasang Sekarang
  </button>
</header>
  
<section class="hero">
  <h1>Cari tukang andal,<br><span>selesai dalam sekejap.</span></h1>
  <p>Dari listrik bocor sampai cat ulang rumah</p>
</section>

<section class="kategori">
  <div class="card">⚡<br>Listrik</div>
  <div class="card">🔨<br>Tukang Kayu</div>
  <div class="card">🚚<br>Pindahan</div>
  <div class="card">💧<br>Ledeng</div>
</section>

<!-- FORM DI SINI -->
<div class="card" id="formOrder">
  <div class="search-box">
    <input type="text" placeholder="Cari tukang atau layanan...">
    <button class="btn full">Cari Tukang</button>
  </div>
</div>
  
<script>
function pindahHalaman(url){
  document.body.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = url;
  }, 300); // delay biar animasi jalan dulu
}
</script>
  <script>
window.onload = function(){
  document.body.style.opacity = 0;
  setTimeout(() => {
    document.body.style.opacity = 1;
  }, 50);
}
  </script>
</body>
</html>
