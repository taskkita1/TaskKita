<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>TaskKita</title>
  <link rel="stylesheet" href="style.css">
  <head>
  <style>
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .logo {
      height: 40px;
    }

    body {
      padding-top: 70px;
    }
  </style>
</head>
</head>
<body>

<header class="navbar">
  <div class="header">
  <img src="assets/logo.png" alt="TaskKita Logo" class="logo">
</div>
  <button class="btn">Pasang Pekerjaan</button>
</header>

<section class="hero">
  <h1>Cari tukang andal,<br><span>selesai dalam sekejap.</span></h1>
  <p>Dari listrik bocor sampai cat ulang rumah</p>
  
  <input type="text" placeholder="Cari tukang atau layanan...">
  <button class="btn full">Cari Tukang</button>
</section>

<section class="kategori">
  <div class="card">⚡ Listrik</div>
  <div class="card">🔨 Tukang Kayu</div>
  <div class="card">🚚 Pindahan</div>
  <div class="card">💧 Ledeng</div>
</section>

</body>
</html>
